<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Lighthouse Restaurant</title>
  <meta name="description" content="Get in touch with Lighthouse Restaurant. Find us, send a message, or make a booking. We'd love to hear from you." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar" class="navbar"></nav>
  <div id="pageHero"></div>

  <section class="section">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-content fade-in">
          <span class="section-tag">FIND US</span>
          <h2 class="section-title left">Come find your <em>table</em></h2>
          <div class="contact-info-list">
            <div class="contact-item"><span class="ci-icon">📍</span><span>123 Harbor Road, Waterfront District</span></div>
            <div class="contact-item"><span class="ci-icon">🕐</span><span>Open Daily · 12:00 PM – 11:00 PM</span></div>
            <div class="contact-item"><span class="ci-icon">📞</span><span>+91 98765 43210</span></div>
            <div class="contact-item"><span class="ci-icon">✉️</span><span>hello@lighthouserestaurant.in</span></div>
          </div>
          <div class="contact-buttons">
            <a href="/reservation/" class="btn btn-accent">BOOK A TABLE <span class="btn-arrow">→</span></a>
            <a href="#" class="btn btn-outline">GET DIRECTIONS</a>
          </div>
          <div class="contact-map" style="margin-top:32px">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.0!2d-122.4!3d37.78!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzfCsDQ2JzQ4LjAiTiAxMjLCsDI0JzAwLjAiVw!5e0!3m2!1sen!2sin!4v1600000000000" width="100%" height="300" style="border:0;border-radius:12px;filter:invert(90%) hue-rotate(180deg);" allowfullscreen loading="lazy"></iframe>
          </div>
        </div>
        <div class="contact-form-wrap fade-in">
          <div class="info-card">
            <span class="section-tag">SEND A MESSAGE</span>
            <h3 class="section-title left" style="font-size:1.5rem;margin-top:8px">We'd love to <em>hear</em> from you</h3>
            <form id="contactForm" class="reservation-form" style="margin-top:20px">
              <div class="form-group"><input type="text" placeholder="Your Name" required /></div>
              <div class="form-group"><input type="email" placeholder="Email Address" required /></div>
              <div class="form-group"><input type="tel" placeholder="Phone (optional)" /></div>
              <div class="form-group"><textarea placeholder="Your message..." rows="5" style="resize:vertical" required></textarea></div>
              <button type="submit" class="btn btn-accent btn-lg full-width">SEND MESSAGE <span class="btn-arrow">→</span></button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer id="footer" class="footer"></footer>
  <div class="toast" id="toast"></div>
  <script type="module" src="/src/contact.ts"></script>
</body>
</html>
